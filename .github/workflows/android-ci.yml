name: Android CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Show source files
        run: |
          echo "=== build.gradle version ==="
          grep -n "version" VitaSleep_Android/app/build.gradle
          echo ""
          echo "=== AndroidManifest.xml service declarations ==="
          grep -n "service\|Service\|FOREGROUND" VitaSleep_Android/app/src/main/AndroidManifest.xml
          echo ""
          echo "=== VitaSleepApp.kt crash logging ==="
          grep -n "crash\|Crash\|last_crash\|PrintWriter" VitaSleep_Android/app/src/main/java/com/vitasleep/android/VitaSleepApp.kt
          echo ""
          echo "=== DeviceScreen.kt crash UI ==="
          grep -n "crash\|Crash\|VitaSleepApp\|crashExpanded" VitaSleep_Android/app/src/main/java/com/vitasleep/android/ui/screens/device/DeviceScreen.kt | head -10
          echo ""
          echo "=== Git log ==="
          git log --oneline -5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d /opt/
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug --info
        working-directory: VitaSleep_Android

      - name: Verify APK
        run: |
          echo "=== APK file ==="
          ls -la VitaSleep_Android/app/build/outputs/apk/debug/app-debug.apk
          echo ""
          echo "=== APK size ==="
          stat --printf="%s" VitaSleep_Android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: VitaSleep_Android/app/build/outputs/apk/debug/app-debug.apk

name: Android CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d /opt/
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: VitaSleep_Android

      - name: Verify APK
        run: |
          echo "APK size: $(stat --printf='%s' VitaSleep_Android/app/build/outputs/apk/debug/app-debug.apk) bytes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: VitaSleep_Android/app/build/outputs/apk/debug/app-debug.apk

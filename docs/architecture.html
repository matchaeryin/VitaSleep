<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>VitaSleep MVP 完整架构图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    padding: 32px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
  }
  svg { width: 100%; height: auto; display: block; }

  @media print {
    body { padding: 16px; }
    @page { size: A3 landscape; margin: 12mm; }
  }

  .print-btn {
    display: inline-block;
    margin-bottom: 20px;
    padding: 10px 24px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .print-btn:hover { background: #333; }
  @media print { .print-btn { display: none; } }
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">打印 / 导出 PDF</button>
<h1>VitaSleep MVP · 完整系统架构图</h1>
<p class="subtitle">包含：演示控制台 · 前端三页面 · 规则引擎 · 智谱AI · 数据层 · 外部集成 · 稳定性保障</p>

<svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="1100" fill="#f8f8f8"/>

  <!-- ═══ 第0层：演示控制台 ═══ -->
  <rect x="30" y="20" width="840" height="120" rx="12" fill="#FFFBF0" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="50" y="46" font-size="13" font-weight="600" fill="#BA7517">演示专属控制台（内部使用，不对用户开放）</text>

  <!-- 参数滑块 -->
  <rect x="50" y="58" width="175" height="68" rx="8" fill="#FFF3D6" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="138" y="80" font-size="13" font-weight="600" fill="#854F0B" text-anchor="middle">参数滑块</text>
  <text x="138" y="97" font-size="11" fill="#A06010" text-anchor="middle">电量 / 心率 / 压力</text>
  <text x="138" y="113" font-size="11" fill="#A06010" text-anchor="middle">实时注入引擎</text>

  <!-- 场景触发 -->
  <rect x="242" y="58" width="175" height="68" rx="8" fill="#FFF3D6" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="330" y="80" font-size="13" font-weight="600" fill="#854F0B" text-anchor="middle">场景一键触发</text>
  <text x="330" y="97" font-size="11" fill="#A06010" text-anchor="middle">场景 1 / 2 / 3</text>
  <text x="330" y="113" font-size="11" fill="#A06010" text-anchor="middle">切换时完整重置状态</text>

  <!-- 决策日志 -->
  <rect x="434" y="58" width="175" height="68" rx="8" fill="#FFF3D6" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="522" y="80" font-size="13" font-weight="600" fill="#854F0B" text-anchor="middle">决策日志</text>
  <text x="522" y="97" font-size="11" fill="#A06010" text-anchor="middle">实时打印 Agent 步骤</text>
  <text x="522" y="113" font-size="11" fill="#A06010" text-anchor="middle">打字机动画效果</text>

  <!-- 基线生成 -->
  <rect x="626" y="58" width="214" height="68" rx="8" fill="#FFF3D6" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="733" y="80" font-size="13" font-weight="600" fill="#854F0B" text-anchor="middle">基线一键生成</text>
  <text x="733" y="97" font-size="11" fill="#A06010" text-anchor="middle">7天种子数据</text>
  <text x="733" y="113" font-size="11" fill="#A06010" text-anchor="middle">Mock 离线可用</text>

  <!-- 控制台→引擎箭头 -->
  <line x1="450" y1="140" x2="450" y2="168" stroke="#EF9F27" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="462" y="158" font-size="10" fill="#BA7517">模拟数据注入</text>

  <!-- ═══ 第1层：前端三页面 ═══ -->
  <rect x="30" y="170" width="840" height="200" rx="12" fill="#FAFAFA" stroke="#CCCCCC" stroke-width="1"/>
  <text x="50" y="194" font-size="13" font-weight="600" fill="#333">前端界面 · Web（React + TypeScript + Tailwind CSS v4）</text>
  <text x="50" y="212" font-size="11" fill="#888">390px 居中显示 · Zustand 状态管理 · sessionStorage 安全存 Key · Recharts 图表</text>

  <!-- 页面一：日程优化 -->
  <rect x="50" y="222" width="250" height="132" rx="8" fill="#EEE8FF" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="175" y="244" font-size="13" font-weight="600" fill="#3C3489" text-anchor="middle">日程优化页</text>
  <text x="175" y="262" font-size="11" fill="#534AB7" text-anchor="middle">单列时间轴 · 事件标红+"!"图标</text>
  <text x="175" y="278" font-size="11" fill="#534AB7" text-anchor="middle">接受建议 / 忽略（恢复原状）</text>
  <text x="175" y="294" font-size="11" fill="#534AB7" text-anchor="middle">编辑 / 新增 / 删除事件</text>
  <text x="175" y="310" font-size="11" fill="#534AB7" text-anchor="middle">飞书双向同步 · 撤销上次同步</text>
  <text x="175" y="326" font-size="11" fill="#534AB7" text-anchor="middle">确认同步前智谱生成总结</text>
  <text x="175" y="342" font-size="11" fill="#534AB7" text-anchor="middle">AppBar 用户面板 / 设置页</text>

  <!-- 页面二：健康与活力 -->
  <rect x="325" y="222" width="250" height="132" rx="8" fill="#EEE8FF" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="450" y="244" font-size="13" font-weight="600" fill="#3C3489" text-anchor="middle">健康与活力页</text>
  <text x="450" y="262" font-size="11" fill="#534AB7" text-anchor="middle">身体电量趋势折线图</text>
  <text x="450" y="278" font-size="11" fill="#534AB7" text-anchor="middle">睡眠时长柱状图</text>
  <text x="450" y="294" font-size="11" fill="#534AB7" text-anchor="middle">生物节律评分卡片</text>
  <text x="450" y="310" font-size="11" fill="#534AB7" text-anchor="middle">7天 / 30天时间切换</text>
  <text x="450" y="326" font-size="11" fill="#534AB7" text-anchor="middle">四宫格数据指标</text>
  <text x="450" y="342" font-size="11" fill="#534AB7" text-anchor="middle">昼夜节律提示卡片</text>

  <!-- 页面三：控制与模拟 -->
  <rect x="600" y="222" width="250" height="132" rx="8" fill="#EEE8FF" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="725" y="244" font-size="13" font-weight="600" fill="#3C3489" text-anchor="middle">控制与模拟页</text>
  <text x="725" y="262" font-size="11" fill="#534AB7" text-anchor="middle">电量 / 心率 / 压力滑块</text>
  <text x="725" y="278" font-size="11" fill="#534AB7" text-anchor="middle">场景1/2/3 触发按钮</text>
  <text x="725" y="294" font-size="11" fill="#534AB7" text-anchor="middle">实时决策日志窗口</text>
  <text x="725" y="310" font-size="11" fill="#534AB7" text-anchor="middle">演示模式开关</text>
  <text x="725" y="326" font-size="11" fill="#534AB7" text-anchor="middle">状态：已启用（模拟模式）</text>
  <text x="725" y="342" font-size="11" fill="#534AB7" text-anchor="middle">底部导航栏三页切换</text>

  <!-- 前端→引擎 -->
  <line x1="450" y1="370" x2="450" y2="398" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ 第2层：规则引擎 ═══ -->
  <rect x="30" y="400" width="840" height="188" rx="12" fill="#F0FBF6" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="50" y="424" font-size="13" font-weight="600" fill="#0F6E56">规则引擎 · Agent 决策核心</text>
  <text x="50" y="442" font-size="11" fill="#1D9E75">纯确定性规则与启发式公式，无需训练模型，未来可替换为 ML 模型</text>

  <!-- 事件分类器 -->
  <rect x="50" y="452" width="182" height="120" rx="8" fill="#C8F0E0" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="141" y="474" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">事件分类器</text>
  <text x="141" y="492" font-size="11" fill="#0F6E56" text-anchor="middle">固定 vs 弹性判断</text>
  <text x="141" y="508" font-size="11" fill="#0F6E56" text-anchor="middle">关键词 + 参与人数</text>
  <text x="141" y="524" font-size="11" fill="#0F6E56" text-anchor="middle">休息类事件不干预</text>
  <text x="141" y="540" font-size="11" fill="#0F6E56" text-anchor="middle">标签规则匹配</text>
  <text x="141" y="556" font-size="11" fill="#0F6E56" text-anchor="middle">iCal 来源标注</text>

  <!-- 身体电量模型 -->
  <rect x="252" y="452" width="182" height="120" rx="8" fill="#C8F0E0" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="343" y="474" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">身体电量模型</text>
  <text x="343" y="492" font-size="11" fill="#0F6E56" text-anchor="middle">线性公式计算</text>
  <text x="343" y="508" font-size="11" fill="#0F6E56" text-anchor="middle">工作时长 − / 睡眠 +</text>
  <text x="343" y="524" font-size="11" fill="#0F6E56" text-anchor="middle">80%+ 不干预</text>
  <text x="343" y="540" font-size="11" fill="#0F6E56" text-anchor="middle">分层阈值触发</text>
  <text x="343" y="556" font-size="11" fill="#0F6E56" text-anchor="middle">输出 0–100</text>

  <!-- 日程重排引擎 -->
  <rect x="454" y="452" width="182" height="120" rx="8" fill="#C8F0E0" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="545" y="474" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">日程重排引擎</text>
  <text x="545" y="492" font-size="11" fill="#0F6E56" text-anchor="middle">阈值触发检测</text>
  <text x="545" y="508" font-size="11" fill="#0F6E56" text-anchor="middle">时间冲突校验</text>
  <text x="545" y="524" font-size="11" fill="#0F6E56" text-anchor="middle">插入休息块</text>
  <text x="545" y="540" font-size="11" fill="#0F6E56" text-anchor="middle">固定事件不可改</text>
  <text x="545" y="556" font-size="11" fill="#0F6E56" text-anchor="middle">幂等写入保护</text>

  <!-- 场景执行器 -->
  <rect x="656" y="452" width="184" height="120" rx="8" fill="#C8F0E0" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="748" y="474" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">场景执行器</text>
  <text x="748" y="492" font-size="11" fill="#0F6E56" text-anchor="middle">场景1：基础闭环</text>
  <text x="748" y="508" font-size="11" fill="#0F6E56" text-anchor="middle">场景2：高疲劳干预</text>
  <text x="748" y="524" font-size="11" fill="#0F6E56" text-anchor="middle">场景3：会议中延后</text>
  <text x="748" y="540" font-size="11" fill="#0F6E56" text-anchor="middle">切换时完整重置</text>
  <text x="748" y="556" font-size="11" fill="#0F6E56" text-anchor="middle">Mock 离线降级</text>

  <!-- 引擎内部流向 -->
  <line x1="232" y1="512" x2="250" y2="512" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="434" y1="512" x2="452" y2="512" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="636" y1="512" x2="654" y2="512" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 引擎→下层 -->
  <line x1="250" y1="588" x2="200" y2="630" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="650" y1="588" x2="690" y2="630" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ 第3层：智谱AI + 数据层 ═══ -->

  <!-- 智谱AI -->
  <rect x="30" y="632" width="390" height="150" rx="12" fill="#EEF6FF" stroke="#4A9EDB" stroke-width="1.1"/>
  <text x="50" y="656" font-size="13" font-weight="600" fill="#185FA5">智谱 AI · GLM-4-flash</text>
  <text x="50" y="674" font-size="11" fill="#4A9EDB">理解层 + 表达层（非决策者）· 15秒超时降级 · JSON 解析兜底</text>

  <rect x="50" y="686" width="168" height="80" rx="8" fill="#C8E0F8" stroke="#4A9EDB" stroke-width="0.8"/>
  <text x="134" y="708" font-size="13" font-weight="600" fill="#0C447C" text-anchor="middle">场景A · 日程分析</text>
  <text x="134" y="726" font-size="11" fill="#185FA5" text-anchor="middle">语义理解事件内容</text>
  <text x="134" y="742" font-size="11" fill="#185FA5" text-anchor="middle">识别连续工作风险</text>
  <text x="134" y="758" font-size="11" fill="#185FA5" text-anchor="middle">返回结构化 JSON</text>

  <rect x="238" y="686" width="168" height="80" rx="8" fill="#C8E0F8" stroke="#4A9EDB" stroke-width="0.8"/>
  <text x="322" y="708" font-size="13" font-weight="600" fill="#0C447C" text-anchor="middle">场景B · 总结生成</text>
  <text x="322" y="726" font-size="11" fill="#185FA5" text-anchor="middle">调整原因说明</text>
  <text x="322" y="742" font-size="11" fill="#185FA5" text-anchor="middle">打字机流式输出</text>
  <text x="322" y="758" font-size="11" fill="#185FA5" text-anchor="middle">每次表达不重复</text>

  <!-- 数据层 -->
  <rect x="440" y="632" width="430" height="150" rx="12" fill="#F5F5F5" stroke="#BBBBBB" stroke-width="1"/>
  <text x="460" y="656" font-size="13" font-weight="600" fill="#333">数据层 · 持久化</text>
  <text x="460" y="674" font-size="11" fill="#888">Zustand persist · sessionStorage · localStorage</text>

  <rect x="460" y="686" width="184" height="80" rx="8" fill="#E8E8E8" stroke="#BBBBBB" stroke-width="0.8"/>
  <text x="552" y="708" font-size="13" font-weight="600" fill="#444" text-anchor="middle">运行时状态</text>
  <text x="552" y="726" font-size="11" fill="#666" text-anchor="middle">电量 / 当前场景</text>
  <text x="552" y="742" font-size="11" fill="#666" text-anchor="middle">已接受建议列表</text>
  <text x="552" y="758" font-size="11" fill="#666" text-anchor="middle">本次忽略事件 ID</text>

  <rect x="660" y="686" width="184" height="80" rx="8" fill="#E8E8E8" stroke="#BBBBBB" stroke-width="0.8"/>
  <text x="752" y="708" font-size="13" font-weight="600" fill="#444" text-anchor="middle">持久化数据</text>
  <text x="752" y="726" font-size="11" fill="#666" text-anchor="middle">飞书 OAuth Token</text>
  <text x="752" y="742" font-size="11" fill="#666" text-anchor="middle">智谱 Key（后4位）</text>
  <text x="752" y="758" font-size="11" fill="#666" text-anchor="middle">上次同步时间</text>

  <!-- 数据层→外部集成 -->
  <line x1="200" y1="782" x2="160" y2="826" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="655" y1="782" x2="655" y2="826" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ 第4层：外部集成 ═══ -->
  <rect x="30" y="828" width="840" height="128" rx="12" fill="#FAFAFA" stroke="#CCCCCC" stroke-width="1"/>
  <text x="50" y="852" font-size="13" font-weight="600" fill="#333">外部集成</text>

  <!-- 飞书日历 -->
  <rect x="50" y="864" width="370" height="76" rx="8" fill="#C8E0F8" stroke="#4A9EDB" stroke-width="0.8"/>
  <text x="235" y="886" font-size="13" font-weight="600" fill="#0C447C" text-anchor="middle">飞书日历 API</text>
  <text x="235" y="904" font-size="11" fill="#185FA5" text-anchor="middle">OAuth 2.0 · 需部署真实域名（Vercel）</text>
  <text x="235" y="920" font-size="11" fill="#185FA5" text-anchor="middle">读取 / 写入 / 更新 / 删除事件 · 幂等保护</text>
  <text x="235" y="936" font-size="11" fill="#185FA5" text-anchor="middle">撤销上次同步 · 本地环境自动切换演示模式</text>

  <!-- 苹果日历 -->
  <rect x="450" y="864" width="390" height="76" rx="8" fill="#C8E0F8" stroke="#4A9EDB" stroke-width="0.8"/>
  <text x="645" y="886" font-size="13" font-weight="600" fill="#0C447C" text-anchor="middle">苹果本地日历</text>
  <text x="645" y="904" font-size="11" fill="#185FA5" text-anchor="middle">Web 端物理上无法直接接入</text>
  <text x="645" y="920" font-size="11" fill="#185FA5" text-anchor="middle">Mock iCal 数据展示 · 卡片标注"iCal"来源</text>
  <text x="645" y="936" font-size="11" fill="#185FA5" text-anchor="middle">iOS App 版通过 EventKit 原生实现</text>

  <!-- ═══ 稳定性 + 未来规划 ═══ -->
  <rect x="30" y="978" width="840" height="96" rx="10" fill="#FFFBF0" stroke="#EF9F27" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text x="450" y="1002" font-size="13" font-weight="600" fill="#BA7517" text-anchor="middle">稳定性保障（已修复）</text>
  <text x="450" y="1022" font-size="11" fill="#854F0B" text-anchor="middle">JSON 解析兜底 · 15秒超时自动降级 · Mock 离线全流程覆盖 · 场景切换完整重置</text>
  <text x="450" y="1040" font-size="11" fill="#854F0B" text-anchor="middle">Key 仅显示后4位 · sessionStorage 会话隔离 · 飞书本地环境自动切演示模式</text>
  <text x="450" y="1060" font-size="11" fill="#854F0B" text-anchor="middle">未来接入点：电量模型 → 真实生物特征模型 · 重排引擎 → ML 优化器 · 前端 → React Native 移动端</text>

  <!-- 图例 -->
  <rect x="30" y="1082" width="840" height="2" fill="#eee"/>
</svg>
</body>
</html>
